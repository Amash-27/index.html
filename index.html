<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.fade-text{
opacity:0;
animation: fadeIn 3s forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* Sections */

.cover, .video-section, .card{
text-align:center;
}

/* Hide sections initially */

.video-section, .card{
display:none;
}

/* Card design */

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
max-width:400px;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#b76e79;
color:white;
cursor:pointer;
transition: all 0.3s ease;
}

button:hover {
background: #a05a68;
transform: scale(1.05);
}

.names{
font-size:28px;
color:#b76e79;
margin:20px 0;
font-weight:bold;
}

.footer{
font-size:14px;
color:#666;
margin-top:20px;
font-style:italic;
}

</style>
</head>

<body>

<!-- OPEN INVITATION -->

<div class="cover" id="cover">

<h2>💌 You Are Invited</h2>

<button onclick="startVideo()">
Open Invitation
</button>

</div>


<!-- VIDEO -->

<div class="video-section" id="videoSection">

<video id="inviteVideo" width="320" controls autoplay>

<source src="Parvez (2).mp4" type="video/mp4">

</video>

</div>


<!-- INVITATION CARD -->

<div class="card" id="card">

<h2 class="fade-text">Baraat Invitation</h2>

<div class="names">
Parvez ❤️ Taiba
</div>

<p>
📅 11 April 2026 <br>
⏰ 5:00 PM <br>
📍 VM Hall, Charra
</p>

<button class="accept"
onclick="accept()">Accept Invitation</button>

<button class="map"
onclick="map()">Open Location</button>

<div class="footer">
Your presence will make our day special
</div>

</div>


<script>

function accept(){
window.location.href="https://docs.google.com/forms/d/e/1FAIpQLScVkI6CoSuznIiknBwbEm4yWzuEEHCY_1NaP8bIks1koZwFGg/viewform?usp=publish-editor";
}
function map(){
window.open("https://maps.app.goo.gl/B9VVpuxvAMVeTUus7");
}


function startVideo(){

document.getElementById("cover").style.display="none";
document.getElementById("videoSection").style.display="block";

var video=document.getElementById("inviteVideo");

video.onended=function(){

document.getElementById("videoSection").style.display="none";
document.getElementById("card").style.display="block";

}

}

</script>

</body>
</html>
